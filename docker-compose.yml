services:
  backend:
    extends:
      file: ./commons/docker-compose.base.yml
      service: backend
    build:
      context: ./backend
      dockerfile: ../commons/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/content-studio.dev.sqlite
      CORS_ORIGINS: http://localhost:5182,http://127.0.0.1:5182
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./commons/backend/database.py:/app/src/app/database.py
      - ./commons/backend/health.py:/app/src/app/health.py
      - ./commons/backend/cors.py:/app/src/app/cors.py

  frontend:
    extends:
      file: ./commons/docker-compose.base.yml
      service: frontend
    build:
      context: ./frontend
      dockerfile: ../commons/frontend/Dockerfile
    ports:
      - "5182:5182"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    command: npm run dev -- --host 0.0.0.0 --port 5182
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - ./commons/frontend/client.ts:/app/src/api/client.ts
    depends_on:
      - backend

volumes:
  frontend_node_modules:
